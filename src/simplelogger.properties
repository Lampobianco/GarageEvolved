# Default: solo errori — il menu usa System.out per l'interfaccia
org.slf4j.simpleLogger.defaultLogLevel=error

# Printer abilitato a info — così printCar/printMotorbike/printBike funzionano
org.slf4j.simpleLogger.log.com.betacom.utils.Printer=info

# VehicleService abilitato a warn — mostra "Targa già presente" e simili
org.slf4j.simpleLogger.log.com.betacom.services.VehicleService=warn

# FileLoader abilitato a info — mostra stato caricamento file
org.slf4j.simpleLogger.log.com.betacom.utils.FileLoader=info
