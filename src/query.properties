# UPDATE campo per campo — tutti usano id_vehicle come chiave
update.vehicle.updateColor=UPDATE vehicles SET id_color = ? WHERE id_vehicle = ?
update.vehicle.updateYear=UPDATE vehicles SET production_year = ? WHERE id_vehicle = ?
update.vehicle.updateGears=UPDATE vehicles SET numbers_of_gears = ? WHERE id_vehicle = ?
update.car.updatePlate=UPDATE cars SET licence_plate = ? WHERE id_vehicle = ?
update.car.updateCc=UPDATE cars SET cc = ? WHERE id_vehicle = ?
update.car.updateDoors=UPDATE cars SET number_of_doors = ? WHERE id_vehicle = ?
update.motorbike.updatePlate=UPDATE motorbikes SET licence_plate = ? WHERE id_vehicle = ?
update.motorbike.updateCc=UPDATE motorbikes SET cc = ? WHERE id_vehicle = ?
update.bike.updateBrakeType=UPDATE bikes SET id_brake_type = ? WHERE id_vehicle = ?
