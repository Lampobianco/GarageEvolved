# =============================================
# Query - vehicles_db
# =============================================

# --- Lookup ---
query.vehicleType.findAll=select * from vehicle_types
query.vehicleType.findById=select * from vehicle_types where id_vehicle_type = ?
query.vehicleBrand.findAll=select * from vehicle_brands
query.vehicleBrand.findById=select * from vehicle_brands where id_vehicle_brand = ?
query.vehicleModel.findAll=select * from vehicle_models
query.vehicleModel.findById=select * from vehicle_models where id_vehicle_model = ?
query.vehicleModel.findByBrand=select * from vehicle_models where id_vehicle_brand = ?
query.vehicleAlimentationType.findAll=select * from vehicle_alimentation_types
query.vehicleAlimentationType.findById=select * from vehicle_alimentation_types where id_vehicle_alimentation_type = ?

# --- Vehicle (con JOIN per ottenere i nomi al posto degli ID) ---
query.vehicle.findAll=select v.id_vehicle, vt.vehicle_type_name, vm.vehicle_model_name, vat.vehicle_alimentation_type_name, vb.vehicle_brand_name, v.color, v.number_of_wheels, v.numbers_of_gears, v.production_year from vehicle v join vehicle_types vt on v.id_vehicle_type=vt.id_vehicle_type join vehicle_models vm on v.id_vehicle_model=vm.id_vehicle_model join vehicle_alimentation_types vat on v.id_vehicle_alimentation_type=vat.id_vehicle_alimentation_type join vehicle_brands vb on v.id_vehicle_brand=vb.id_vehicle_brand
query.vehicle.findById=select v.id_vehicle, vt.vehicle_type_name, vm.vehicle_model_name, vat.vehicle_alimentation_type_name, vb.vehicle_brand_name, v.color, v.number_of_wheels, v.numbers_of_gears, v.production_year from vehicle v join vehicle_types vt on v.id_vehicle_type=vt.id_vehicle_type join vehicle_models vm on v.id_vehicle_model=vm.id_vehicle_model join vehicle_alimentation_types vat on v.id_vehicle_alimentation_type=vat.id_vehicle_alimentation_type join vehicle_brands vb on v.id_vehicle_brand=vb.id_vehicle_brand where v.id_vehicle=?

update.vehicle.insert=insert into vehicle (id_vehicle_type,id_vehicle_model,id_vehicle_alimentation_type,id_vehicle_brand,color,number_of_wheels,numbers_of_gears,production_year) values (?,?,?,?,?,?,?,?)
update.vehicle.delete=delete from vehicle where id_vehicle=?

# --- Cars (JOIN con vehicle per avere tutti i dati) ---
query.car.findAll=select v.id_vehicle, vt.vehicle_type_name, vm.vehicle_model_name, vat.vehicle_alimentation_type_name, vb.vehicle_brand_name, v.color, v.number_of_wheels, v.numbers_of_gears, v.production_year, c.id_car, c.licence_plate, c.cc, c.number_of_doors from cars c join vehicle v on c.id_vehicle=v.id_vehicle join vehicle_types vt on v.id_vehicle_type=vt.id_vehicle_type join vehicle_models vm on v.id_vehicle_model=vm.id_vehicle_model join vehicle_alimentation_types vat on v.id_vehicle_alimentation_type=vat.id_vehicle_alimentation_type join vehicle_brands vb on v.id_vehicle_brand=vb.id_vehicle_brand
query.car.findById=select v.id_vehicle, vt.vehicle_type_name, vm.vehicle_model_name, vat.vehicle_alimentation_type_name, vb.vehicle_brand_name, v.color, v.number_of_wheels, v.numbers_of_gears, v.production_year, c.id_car, c.licence_plate, c.cc, c.number_of_doors from cars c join vehicle v on c.id_vehicle=v.id_vehicle join vehicle_types vt on v.id_vehicle_type=vt.id_vehicle_type join vehicle_models vm on v.id_vehicle_model=vm.id_vehicle_model join vehicle_alimentation_types vat on v.id_vehicle_alimentation_type=vat.id_vehicle_alimentation_type join vehicle_brands vb on v.id_vehicle_brand=vb.id_vehicle_brand where c.id_car=?

update.car.insert=insert into cars (id_vehicle,licence_plate,cc,number_of_doors) values (?,?,?,?)
update.car.delete=delete from cars where id_car=?

# --- Motorbikes ---
query.motorbike.findAll=select v.id_vehicle, vt.vehicle_type_name, vm.vehicle_model_name, vat.vehicle_alimentation_type_name, vb.vehicle_brand_name, v.color, v.number_of_wheels, v.numbers_of_gears, v.production_year, m.id_motorbike, m.licence_plate, m.cc from motorbikes m join vehicle v on m.id_vehicle=v.id_vehicle join vehicle_types vt on v.id_vehicle_type=vt.id_vehicle_type join vehicle_models vm on v.id_vehicle_model=vm.id_vehicle_model join vehicle_alimentation_types vat on v.id_vehicle_alimentation_type=vat.id_vehicle_alimentation_type join vehicle_brands vb on v.id_vehicle_brand=vb.id_vehicle_brand
query.motorbike.findById=select v.id_vehicle, vt.vehicle_type_name, vm.vehicle_model_name, vat.vehicle_alimentation_type_name, vb.vehicle_brand_name, v.color, v.number_of_wheels, v.numbers_of_gears, v.production_year, m.id_motorbike, m.licence_plate, m.cc from motorbikes m join vehicle v on m.id_vehicle=v.id_vehicle join vehicle_types vt on v.id_vehicle_type=vt.id_vehicle_type join vehicle_models vm on v.id_vehicle_model=vm.id_vehicle_model join vehicle_alimentation_types vat on v.id_vehicle_alimentation_type=vat.id_vehicle_alimentation_type join vehicle_brands vb on v.id_vehicle_brand=vb.id_vehicle_brand where m.id_motorbike=?

update.motorbike.insert=insert into motorbikes (id_vehicle,licence_plate,cc) values (?,?,?)
update.motorbike.delete=delete from motorbikes where id_motorbike=?

# --- Bikes ---
query.bike.findAll=select v.id_vehicle, vt.vehicle_type_name, vm.vehicle_model_name, vat.vehicle_alimentation_type_name, vb.vehicle_brand_name, v.color, v.number_of_wheels, v.numbers_of_gears, v.production_year, b.id_bike, b.brake_type, b.suspension_type, b.foldable from bikes b join vehicle v on b.id_vehicle=v.id_vehicle join vehicle_types vt on v.id_vehicle_type=vt.id_vehicle_type join vehicle_models vm on v.id_vehicle_model=vm.id_vehicle_model join vehicle_alimentation_types vat on v.id_vehicle_alimentation_type=vat.id_vehicle_alimentation_type join vehicle_brands vb on v.id_vehicle_brand=vb.id_vehicle_brand
query.bike.findById=select v.id_vehicle, vt.vehicle_type_name, vm.vehicle_model_name, vat.vehicle_alimentation_type_name, vb.vehicle_brand_name, v.color, v.number_of_wheels, v.numbers_of_gears, v.production_year, b.id_bike, b.brake_type, b.suspension_type, b.foldable from bikes b join vehicle v on b.id_vehicle=v.id_vehicle join vehicle_types vt on v.id_vehicle_type=vt.id_vehicle_type join vehicle_models vm on v.id_vehicle_model=vm.id_vehicle_model join vehicle_alimentation_types vat on v.id_vehicle_alimentation_type=vat.id_vehicle_alimentation_type join vehicle_brands vb on v.id_vehicle_brand=vb.id_vehicle_brand where b.id_bike=?

update.bike.insert=insert into bikes (id_vehicle,brake_type,suspension_type,foldable) values (?,?,?,?)
update.bike.delete=delete from bikes where id_bike=?
