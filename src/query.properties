# Query - vehicles_db
# =============================================

# --- Lookup ---
query.vehicleType.findAll=select * from vehicle_types
query.vehicleType.findById=select * from vehicle_types where id_vehicle_type = ?
query.vehicleBrand.findAll=select * from vehicle_brands
query.vehicleBrand.findById=select * from vehicle_brands where id_vehicle_brand = ?
query.vehicleModel.findAll=select * from vehicle_models
query.vehicleModel.findById=select * from vehicle_models where id_vehicle_model = ?
query.vehicleModel.findByBrand=select * from vehicle_models where id_vehicle_brand = ?
query.vehicleAlimentationType.findAll=select * from vehicle_alimentation_types
query.vehicleAlimentationType.findById=select * from vehicle_alimentation_types where id_vehicle_alimentation_type = ?
query.color.findAll=select * from vehicle_colors
query.color.findById=select * from vehicle_colors where id_color = ?
query.brakeType.findAll=select * from brake_types
query.suspensionType.findAll=select * from suspension_types

# --- Cars ---
query.car.findAll=select v.id_vehicle,vt.vehicle_type_name,vm.vehicle_model_name,vat.vehicle_alimentation_type_name,vb.vehicle_brand_name,col.color_name,v.number_of_wheels,v.numbers_of_gears,v.production_year,c.id_car,c.licence_plate,c.cc,c.number_of_doors from cars c join vehicles v on c.id_vehicle=v.id_vehicle join vehicle_types vt on v.id_vehicle_type=vt.id_vehicle_type join vehicle_models vm on v.id_vehicle_model=vm.id_vehicle_model join vehicle_alimentation_types vat on v.id_vehicle_alimentation_type=vat.id_vehicle_alimentation_type join vehicle_brands vb on v.id_vehicle_brand=vb.id_vehicle_brand join vehicle_colors col on v.id_color=col.id_color
query.car.findById=select v.id_vehicle,vt.vehicle_type_name,vm.vehicle_model_name,vat.vehicle_alimentation_type_name,vb.vehicle_brand_name,col.color_name,v.number_of_wheels,v.numbers_of_gears,v.production_year,c.id_car,c.licence_plate,c.cc,c.number_of_doors from cars c join vehicles v on c.id_vehicle=v.id_vehicle join vehicle_types vt on v.id_vehicle_type=vt.id_vehicle_type join vehicle_models vm on v.id_vehicle_model=vm.id_vehicle_model join vehicle_alimentation_types vat on v.id_vehicle_alimentation_type=vat.id_vehicle_alimentation_type join vehicle_brands vb on v.id_vehicle_brand=vb.id_vehicle_brand join vehicle_colors col on v.id_color=col.id_color where c.id_car=?
query.car.searchByPlate=select v.id_vehicle,vt.vehicle_type_name,vm.vehicle_model_name,vat.vehicle_alimentation_type_name,vb.vehicle_brand_name,col.color_name,v.number_of_wheels,v.numbers_of_gears,v.production_year,c.id_car,c.licence_plate,c.cc,c.number_of_doors from cars c join vehicles v on c.id_vehicle=v.id_vehicle join vehicle_types vt on v.id_vehicle_type=vt.id_vehicle_type join vehicle_models vm on v.id_vehicle_model=vm.id_vehicle_model join vehicle_alimentation_types vat on v.id_vehicle_alimentation_type=vat.id_vehicle_alimentation_type join vehicle_brands vb on v.id_vehicle_brand=vb.id_vehicle_brand join vehicle_colors col on v.id_color=col.id_color where c.licence_plate ILIKE ?
query.car.findByBrand=select v.id_vehicle,vt.vehicle_type_name,vm.vehicle_model_name,vat.vehicle_alimentation_type_name,vb.vehicle_brand_name,col.color_name,v.number_of_wheels,v.numbers_of_gears,v.production_year,c.id_car,c.licence_plate,c.cc,c.number_of_doors from cars c join vehicles v on c.id_vehicle=v.id_vehicle join vehicle_types vt on v.id_vehicle_type=vt.id_vehicle_type join vehicle_models vm on v.id_vehicle_model=vm.id_vehicle_model join vehicle_alimentation_types vat on v.id_vehicle_alimentation_type=vat.id_vehicle_alimentation_type join vehicle_brands vb on v.id_vehicle_brand=vb.id_vehicle_brand join vehicle_colors col on v.id_color=col.id_color where v.id_vehicle_brand=?
query.car.findByColor=select v.id_vehicle,vt.vehicle_type_name,vm.vehicle_model_name,vat.vehicle_alimentation_type_name,vb.vehicle_brand_name,col.color_name,v.number_of_wheels,v.numbers_of_gears,v.production_year,c.id_car,c.licence_plate,c.cc,c.number_of_doors from cars c join vehicles v on c.id_vehicle=v.id_vehicle join vehicle_types vt on v.id_vehicle_type=vt.id_vehicle_type join vehicle_models vm on v.id_vehicle_model=vm.id_vehicle_model join vehicle_alimentation_types vat on v.id_vehicle_alimentation_type=vat.id_vehicle_alimentation_type join vehicle_brands vb on v.id_vehicle_brand=vb.id_vehicle_brand join vehicle_colors col on v.id_color=col.id_color where v.id_color=?
query.car.findByYear=select v.id_vehicle,vt.vehicle_type_name,vm.vehicle_model_name,vat.vehicle_alimentation_type_name,vb.vehicle_brand_name,col.color_name,v.number_of_wheels,v.numbers_of_gears,v.production_year,c.id_car,c.licence_plate,c.cc,c.number_of_doors from cars c join vehicles v on c.id_vehicle=v.id_vehicle join vehicle_types vt on v.id_vehicle_type=vt.id_vehicle_type join vehicle_models vm on v.id_vehicle_model=vm.id_vehicle_model join vehicle_alimentation_types vat on v.id_vehicle_alimentation_type=vat.id_vehicle_alimentation_type join vehicle_brands vb on v.id_vehicle_brand=vb.id_vehicle_brand join vehicle_colors col on v.id_color=col.id_color where extract(year from v.production_year)::int=?

query.car.findByPlate=select v.id_vehicle,vt.vehicle_type_name,vm.vehicle_model_name,vat.vehicle_alimentation_type_name,vb.vehicle_brand_name,col.color_name,v.number_of_wheels,v.numbers_of_gears,v.production_year,c.id_car,c.licence_plate,c.cc,c.number_of_doors from cars c join vehicles v on c.id_vehicle=v.id_vehicle join vehicle_types vt on v.id_vehicle_type=vt.id_vehicle_type join vehicle_models vm on v.id_vehicle_model=vm.id_vehicle_model join vehicle_alimentation_types vat on v.id_vehicle_alimentation_type=vat.id_vehicle_alimentation_type join vehicle_brands vb on v.id_vehicle_brand=vb.id_vehicle_brand join vehicle_colors col on v.id_color=col.id_color where c.licence_plate=?

update.car.insert=insert into cars (id_vehicle,licence_plate,cc,number_of_doors) values (?,?,?,?)
update.car.delete=delete from cars where id_car=?

